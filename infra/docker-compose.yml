services:
  postgres:
    image: postgres:16-alpine
    container_name: citysafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: citysafe
    ports:
      - "5432:5432"
    volumes:
      - citysafe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d citysafe"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  adminer:
    image: adminer
    container_name: citysafe-adminer
    ports:
    - "8080:8080"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: citysafe-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - citysafe_minio:/data

volumes:
  citysafe_pgdata:
  citysafe_minio:
