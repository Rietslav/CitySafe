services:
  postgres:
    image: postgres:16-alpine
    container_name: citysafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: citysafe
    ports:
      - "5432:5432"
    volumes:
      - citysafe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d citysafe"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  adminer:
    image: adminer
    container_name: citysafe-adminer
    ports:
    - "8080:8080"
    restart: unless-stopped

volumes:
  citysafe_pgdata:
